# ------------------------------------------
# CUSTOMIZABLE TEMPLATE REPOSITORY VARIABLES
# 
env:
  SONAR_PROJECT_KEY:  "ElektroStudios_VBNet-Snippet-Collection"
  SONAR_ORGANIZATION: "elektrostudios"
# ------------------------------------------

name: SonarQube
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
          $projectContent = @"
          <Project Sdk=`"Microsoft.NET.Sdk`">
            <PropertyGroup>
              <TargetFramework>net8.0</TargetFramework>
              <OutputType>Library</OutputType>
              <OptionStrict>On</OptionStrict>
              <OptionExplicit>On</OptionExplicit>
              <OptionInfer>Off</OptionInfer>
              <GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <LangVersion>latest</LangVersion>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include=`"**\*.vb`" />
            </ItemGroup>
          </Project>
          "@
          Set-Content -Path "DummyProject.vbproj" -Value $projectContent
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_ORGANIZATION }}" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.sourceEncoding=UTF-8
          dotnet build "DummyProject.vbproj" -c Release || $true
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"